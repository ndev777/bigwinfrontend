<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Color Game — BIGWIN</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0b0c17;
  --card:      rgba(255,255,255,0.07);
  --card2:     rgba(255,255,255,0.04);
  --glass:     rgba(255,255,255,0.09);
  --border:    rgba(255,255,255,0.10);
  --border2:   rgba(255,255,255,0.06);
  --red:       #ff3b5c;
  --red-bg:    rgba(255,59,92,0.12);
  --red-glow:  rgba(255,59,92,0.3);
  --green:     #34c759;
  --green-bg:  rgba(52,199,89,0.12);
  --green-glow:rgba(52,199,89,0.3);
  --blue:      #007aff;
  --gold:      #ffd60a;
  --txt:       #f2f2f7;
  --txt2:      rgba(242,242,247,0.55);
  --txt3:      rgba(242,242,247,0.3);
  --safe-top:  env(safe-area-inset-top, 44px);
  --safe-bot:  env(safe-area-inset-bottom, 34px);
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: 'Nunito Sans', sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: calc(80px + var(--safe-bot));
}

/* ── ANIMATED BG ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 40% at 20% 10%, rgba(255,59,92,.07) 0%, transparent 55%),
    radial-gradient(ellipse 60% 45% at 80% 85%, rgba(52,199,89,.06) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(0,122,255,.04) 0%, transparent 70%);
  pointer-events: none;
}

.wrap {
  max-width: 430px;
  margin: 0 auto;
  padding: 0 16px;
  position: relative; z-index: 1;
}

/* ── STATUS BAR SPACER ── */
.status-spacer {
  height: calc(var(--safe-top) + 10px);
}

/* ── TOP NAV ── */
.top-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0 14px;
}
.logo-pill {
  display: flex; align-items: center; gap: 8px;
}
.logo-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, #ff3b5c, #ff6b35);
  display: grid; place-items: center; font-size: 17px;
  box-shadow: 0 4px 14px rgba(255,59,92,.35);
}
.logo-name {
  font-family: 'Nunito', sans-serif;
  font-size: 20px; font-weight: 900; letter-spacing: -.3px;
}
.logo-name span { color: var(--red); }
.top-right { display: flex; align-items: center; gap: 8px; }
.live-chip {
  display: flex; align-items: center; gap: 5px;
  background: rgba(52,199,89,.12);
  border: 1px solid rgba(52,199,89,.25);
  border-radius: 20px; padding: 5px 10px;
  font-size: 11px; font-weight: 800; color: var(--green);
  letter-spacing: .5px;
}
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 1.8s infinite; }
.balance-chip {
  background: rgba(255,214,10,.1);
  border: 1px solid rgba(255,214,10,.2);
  border-radius: 20px; padding: 6px 13px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 900; color: var(--gold);
  cursor: pointer; transition: all .2s;
  white-space: nowrap;
}
.balance-chip:active { transform: scale(.94); }

/* ── ROUND CARD ── */
.round-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 18px 20px;
  margin-bottom: 12px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.round-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.round-id-grp {}
.round-id-lbl {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--txt3); margin-bottom: 3px;
}
.round-id-val {
  font-family: 'Nunito', sans-serif;
  font-size: 18px; font-weight: 900; color: var(--txt);
  letter-spacing: -.5px;
}

.timer-area { text-align: right; }
.time-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--txt3); margin-bottom: 3px; }
.time-val {
  font-family: 'Nunito', sans-serif;
  font-size: 32px; font-weight: 900; line-height: 1;
  color: var(--green);
  transition: color .3s;
}
.time-val.warn { color: var(--gold); }
.time-val.danger { color: var(--red); animation: throb .5s infinite alternate; }
@keyframes throb { from { opacity:1 } to { opacity:.5 } }

/* ── TIMER RING CENTER ── */
.timer-center {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 14px;
}
.ring-wrap {
  position: relative; width: 100px; height: 100px;
}
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { stroke: rgba(255,255,255,.08); fill: none; stroke-width: 7; }
.ring-fill { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset .9s ease, stroke .3s; }
.ring-center {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
}
.ring-num {
  font-family: 'Nunito', sans-serif;
  font-size: 30px; font-weight: 900; line-height: 1;
  transition: color .3s;
}
.phase-label {
  font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  margin-top: 10px;
}
.phase-label.go   { color: var(--green); }
.phase-label.warn { color: var(--gold); }
.phase-label.stop { color: var(--red); }

/* ── STREAK ── */
.streak-row {
  display: flex; align-items: center; gap: 8px;
  overflow-x: auto; padding-bottom: 2px;
}
.streak-row::-webkit-scrollbar { display: none; }
.streak-lbl {
  font-size: 10px; font-weight: 800; color: var(--txt3);
  text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;
}
.s-pill {
  width: 28px; height: 28px; border-radius: 8px;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 900; flex-shrink: 0;
}
.s-pill.R { background: rgba(255,59,92,.2); color: var(--red); border: 1px solid rgba(255,59,92,.3); }
.s-pill.G { background: rgba(52,199,89,.15); color: var(--green); border: 1px solid rgba(52,199,89,.25); }

/* ── BET BUTTONS ── */
.bet-label {
  font-size: 12px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; color: var(--txt3);
  text-align: center; margin-bottom: 10px;
}
.bet-btns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 12px;
}
.color-btn {
  border: none; cursor: pointer; border-radius: 22px;
  padding: 22px 16px 18px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  position: relative; overflow: hidden;
  transition: transform .15s, box-shadow .2s;
  -webkit-tap-highlight-color: transparent;
}
.color-btn:active { transform: scale(.95); }
.color-btn.disabled { opacity: .4; pointer-events: none; }

.red-btn {
  background: linear-gradient(160deg, #2a0a10 0%, #1e0810 100%);
  border: 1.5px solid rgba(255,59,92,.3);
  box-shadow: 0 8px 30px rgba(255,59,92,.12), inset 0 1px 0 rgba(255,59,92,.15);
}
.red-btn.selected {
  border-color: var(--red);
  box-shadow: 0 10px 40px rgba(255,59,92,.35), inset 0 1px 0 rgba(255,59,92,.3);
}
.grn-btn {
  background: linear-gradient(160deg, #0a1f10 0%, #081a0c 100%);
  border: 1.5px solid rgba(52,199,89,.25);
  box-shadow: 0 8px 30px rgba(52,199,89,.1), inset 0 1px 0 rgba(52,199,89,.12);
}
.grn-btn.selected {
  border-color: var(--green);
  box-shadow: 0 10px 40px rgba(52,199,89,.3), inset 0 1px 0 rgba(52,199,89,.25);
}

.orb {
  width: 52px; height: 52px; border-radius: 50%;
}
.red-btn .orb {
  background: radial-gradient(circle at 35% 30%, #ff8099, #ff3b5c 50%, #8a0020);
  box-shadow: 0 8px 24px rgba(255,59,92,.5);
}
.grn-btn .orb {
  background: radial-gradient(circle at 35% 30%, #7dffaa, #34c759 50%, #0d6e28);
  box-shadow: 0 8px 24px rgba(52,199,89,.45);
}
.color-btn.selected .orb { animation: orbPulse 1s infinite alternate; }
@keyframes orbPulse { from { transform: scale(1) } to { transform: scale(1.08) } }

.btn-name {
  font-family: 'Nunito', sans-serif;
  font-size: 20px; font-weight: 900; letter-spacing: -.3px;
}
.red-btn .btn-name { color: var(--red); }
.grn-btn .btn-name { color: var(--green); }
.btn-odds {
  font-size: 11px; font-weight: 700; color: var(--txt3);
  background: rgba(255,255,255,.06); border-radius: 20px;
  padding: 3px 10px;
}

/* ── AMOUNT BOX ── */
.amt-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 22px; padding: 16px;
  margin-bottom: 12px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.amt-label {
  font-size: 10px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 10px;
}
.amt-input-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 14px;
  margin-bottom: 12px;
}
.amt-sym {
  font-family: 'Nunito', sans-serif;
  font-size: 22px; font-weight: 900; color: var(--txt2);
}
.amt-in {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'Nunito', sans-serif;
  font-size: 28px; font-weight: 900; color: var(--txt);
  width: 0; min-width: 0;
}
.amt-in::placeholder { color: var(--txt3); }
.amt-clr {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,.1); border: none;
  display: grid; place-items: center; cursor: pointer;
  color: var(--txt2); font-size: 12px; transition: all .15s;
}
.amt-clr:active { background: rgba(255,59,92,.2); color: var(--red); transform: scale(.9); }

.quick-grid {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 8px;
}
.qk-btn {
  padding: 10px 4px; border-radius: 12px; border: 1px solid var(--border2);
  background: var(--card2); color: var(--txt2);
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800; cursor: pointer;
  transition: all .15s; text-align: center;
}
.qk-btn:active { transform: scale(.93); }
.qk-btn:hover { background: var(--glass); border-color: var(--border); color: var(--txt); }
.qk-btn.sp {
  color: var(--gold); border-color: rgba(255,214,10,.2);
  background: rgba(255,214,10,.06);
}
.qk-btn.sp:hover { background: rgba(255,214,10,.12); }

/* ── TABS & HISTORY ── */
.tabs-wrap { margin-bottom: 10px; }
.tabs-seg {
  display: flex; background: rgba(255,255,255,.06);
  border-radius: 14px; padding: 4px; gap: 2px;
}
.tab {
  flex: 1; padding: 9px; border: none; border-radius: 11px;
  background: none; color: var(--txt3);
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800;
  cursor: pointer; transition: all .2s; letter-spacing: .2px;
}
.tab.active {
  background: var(--glass); color: var(--txt);
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
}

.hist-list {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  max-height: 300px; overflow-y: auto;
}
.hist-list::-webkit-scrollbar { width: 3px; }
.hist-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

.hist-empty {
  padding: 40px; text-align: center;
  color: var(--txt3); font-size: 13px; font-weight: 700;
  letter-spacing: .5px;
}
.hist-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border2);
  transition: background .15s;
}
.hist-item:last-child { border-bottom: none; }
.hist-item:active { background: rgba(255,255,255,.03); }
.hist-badge2 {
  width: 36px; height: 36px; border-radius: 11px;
  display: grid; place-items: center;
  font-size: 13px; font-weight: 900; flex-shrink: 0;
}
.hist-badge2.R { background: rgba(255,59,92,.15); color: var(--red); border: 1px solid rgba(255,59,92,.2); }
.hist-badge2.G { background: rgba(52,199,89,.12); color: var(--green); border: 1px solid rgba(52,199,89,.2); }
.hist-info { flex: 1; min-width: 0; }
.hist-title2 { font-size: 13px; font-weight: 800; color: var(--txt); }
.hist-sub2 { font-size: 11px; color: var(--txt3); margin-top: 2px; }
.hist-result {
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 900; text-align: right;
}
.hist-result.won { color: var(--green); }
.hist-result.lost { color: var(--red); }
.hist-result.pend { color: var(--txt3); }
.hist-result.neutral-r { color: var(--red); }
.hist-result.neutral-g { color: var(--green); }

/* ── BOTTOM NAV ── */
.bot-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(11,12,23,.9);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-top: 1px solid var(--border2);
  padding: 8px 0 calc(8px + var(--safe-bot));
  display: flex; z-index: 100;
}
.nav-a {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  text-decoration: none; color: var(--txt3);
  transition: all .2s; padding: 4px 0;
}
.nav-a.active { color: var(--blue); }
.nav-a.active .nav-ic-wrap { color: var(--blue); }
.nav-ic-wrap { font-size: 22px; transition: transform .2s; }
.nav-a.active .nav-ic-wrap { transform: scale(1.15); }
.nav-lb2 {
  font-size: 10px; font-weight: 800; letter-spacing: .5px;
  text-transform: uppercase;
}

/* ── TOAST ── */
.toast {
  position: fixed; top: calc(var(--safe-top) + 60px);
  left: 50%; transform: translateX(-50%) translateY(-10px);
  background: rgba(28,28,30,.96);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 12px 20px;
  font-size: 14px; font-weight: 700;
  backdrop-filter: blur(20px);
  opacity: 0; transition: all .3s;
  z-index: 500; white-space: nowrap;
  box-shadow: 0 10px 40px rgba(0,0,0,.5);
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── WIN/LOSS BOTTOM SHEET ── */
.sheet-ov {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(8px);
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.sheet-ov.show { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
  border-radius: 30px 30px 0 0;
  padding: 0 20px calc(24px + var(--safe-bot));
  transform: translateY(100%);
  transition: transform .4s cubic-bezier(.34,1.1,.64,1);
  max-width: 430px; margin: 0 auto;
}
.sheet-ov.show .sheet { transform: translateY(0); }
.sheet.win {
  background: linear-gradient(180deg, #071510, #040f0a);
  border-top: 2px solid rgba(52,199,89,.5);
  box-shadow: 0 -20px 60px rgba(52,199,89,.2);
}
.sheet.loss {
  background: linear-gradient(180deg, #150710, #0f0408);
  border-top: 2px solid rgba(255,59,92,.5);
  box-shadow: 0 -20px 60px rgba(255,59,92,.15);
}
.sheet.bet {
  background: linear-gradient(180deg, #0a0b17, #070810);
  border-top: 2px solid rgba(0,122,255,.4);
  box-shadow: 0 -20px 60px rgba(0,122,255,.15);
}
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.15);
  margin: 12px auto 20px;
}
.sheet-cd {
  height: 3px; background: rgba(255,255,255,.08);
  border-radius: 2px; margin-bottom: 24px; overflow: hidden;
}
.sheet-cd-fill { height: 100%; border-radius: 2px; transition: width 1s linear; }
.win .sheet-cd-fill { background: var(--green); }
.loss .sheet-cd-fill { background: var(--red); }
.bet .sheet-cd-fill { background: var(--blue); }

.sheet-emoji { font-size: 60px; text-align: center; margin-bottom: 10px; animation: emojiIn .5s cubic-bezier(.34,1.4,.64,1); }
@keyframes emojiIn { from { transform:scale(0) rotate(-20deg) } to { transform:scale(1) rotate(0deg) } }
.sheet-title {
  font-family: 'Nunito', sans-serif;
  font-size: 28px; font-weight: 900; text-align: center;
  letter-spacing: -.5px; margin-bottom: 20px;
}
.win .sheet-title { color: var(--green); }
.loss .sheet-title { color: var(--red); }
.bet .sheet-title { color: #fff; }

.sheet-rows {
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border2);
  border-radius: 18px; padding: 6px 4px;
  margin-bottom: 20px;
}
.s-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border2);
}
.s-row:last-child { border: none; }
.s-row-k { font-size: 13px; font-weight: 700; color: var(--txt3); }
.s-row-v { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900; color: var(--txt); }

.sheet-btn {
  width: 100%; padding: 17px; border: none;
  border-radius: 18px; cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 17px; font-weight: 900; letter-spacing: -.2px;
  transition: transform .15s;
}
.sheet-btn:active { transform: scale(.96); }
.win  .sheet-btn { background: linear-gradient(135deg, #34c759, #28a745); color: #fff; box-shadow: 0 8px 25px rgba(52,199,89,.4); }
.loss .sheet-btn { background: linear-gradient(135deg, #ff3b5c, #d62b49); color: #fff; box-shadow: 0 8px 25px rgba(255,59,92,.3); }
.bet  .sheet-btn { background: linear-gradient(135deg, #007aff, #0055d4); color: #fff; box-shadow: 0 8px 25px rgba(0,122,255,.3); }

/* ── DEPOSIT SHEET ── */
.dep-ov {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(10px);
  display: flex; align-items: flex-end;
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.dep-ov.show { opacity: 1; pointer-events: all; }
.dep-box {
  width: 100%; max-width: 430px; margin: 0 auto;
  background: #13141f;
  border: 1px solid var(--border);
  border-radius: 30px 30px 0 0;
  padding: 20px 24px calc(32px + var(--safe-bot));
  text-align: center;
  transform: translateY(100%);
  transition: transform .4s cubic-bezier(.34,1.1,.64,1);
}
.dep-ov.show .dep-box { transform: translateY(0); }
.dep-icon { font-size: 52px; margin-bottom: 12px; }
.dep-title { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; margin-bottom: 8px; }
.dep-sub { font-size: 14px; color: var(--txt2); line-height: 1.5; margin-bottom: 24px; }
.dep-btns { display: flex; flex-direction: column; gap: 10px; }
.dep-btn {
  padding: 16px; border: none; border-radius: 16px; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
  transition: transform .15s;
}
.dep-btn:active { transform: scale(.96); }
.dep-btn.p { background: linear-gradient(135deg, #007aff, #0055d4); color: #fff; box-shadow: 0 6px 20px rgba(0,122,255,.3); }
.dep-btn.s { background: rgba(255,255,255,.07); border: 1px solid var(--border); color: var(--txt2); }

/* ── CONFETTI ── */
.conf {
  position: fixed; pointer-events: none; z-index: 600;
  border-radius: 2px;
  animation: confFall linear forwards;
}
@keyframes confFall {
  from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  to   { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ── PULSE ── */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>

<div class="wrap">
  <div class="status-spacer"></div>

  <!-- TOP NAV -->
  <div class="top-nav">
    <div class="logo-pill">
      <div class="logo-icon">🎯</div>
      <div class="logo-name">BIG<span>WIN</span></div>
    </div>
    <div class="top-right">
      <div class="live-chip"><div class="live-dot"></div>LIVE</div>
      <div class="balance-chip" id="balChip" onclick="loadBalance()">₹0.00</div>
    </div>
  </div>

  <!-- ROUND CARD -->
  <div class="round-card">
    <div class="round-top">
      <div class="round-id-grp">
        <div class="round-id-lbl">Round ID</div>
        <div class="round-id-val" id="roundId">—</div>
      </div>
      <div class="timer-area">
        <div class="time-lbl">Time Left</div>
        <div class="time-val" id="timeVal">60s</div>
      </div>
    </div>

    <!-- RING TIMER -->
    <div class="timer-center">
      <div class="ring-wrap">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="43"/>
          <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="43"
            stroke="#34c759"
            stroke-dasharray="270.2"
            stroke-dashoffset="0"/>
        </svg>
        <div class="ring-center">
          <div class="ring-num" id="ringNum" style="color:#34c759">60</div>
        </div>
      </div>
      <div class="phase-label go" id="phaseLbl">Betting Open</div>
    </div>

    <!-- STREAK -->
    <div class="streak-row">
      <div class="streak-lbl">Last:</div>
      <div id="streakPills" style="display:flex;gap:6px;flex-shrink:0"></div>
    </div>
  </div>

  <!-- BET BUTTONS -->
  <div class="bet-label">Place Your Bet</div>
  <div class="bet-btns">
    <button class="color-btn red-btn" id="redBtn" onclick="pickColor('red',event)">
      <div class="orb"></div>
      <div class="btn-name">Red</div>
      <div class="btn-odds">1.96× payout</div>
    </button>
    <button class="color-btn grn-btn" id="grnBtn" onclick="pickColor('green',event)">
      <div class="orb"></div>
      <div class="btn-name">Green</div>
      <div class="btn-odds">1.96× payout</div>
    </button>
  </div>

  <!-- AMOUNT -->
  <div class="amt-card">
    <div class="amt-label">Bet Amount</div>
    <div class="amt-input-row">
      <div class="amt-sym">₹</div>
      <input class="amt-in" type="number" id="betAmt" placeholder="0" value="10" min="10" max="10000" inputmode="numeric">
      <button class="amt-clr" onclick="document.getElementById('betAmt').value=''">✕</button>
    </div>
    <div class="quick-grid">
      <button class="qk-btn" onclick="sa(10)">₹10</button>
      <button class="qk-btn" onclick="sa(50)">₹50</button>
      <button class="qk-btn" onclick="sa(100)">₹100</button>
      <button class="qk-btn" onclick="sa(500)">₹500</button>
      <button class="qk-btn sp" onclick="half()">½ Half</button>
      <button class="qk-btn sp" onclick="dbl()">×2 Dbl</button>
      <button class="qk-btn" onclick="sa(1000)">₹1K</button>
      <button class="qk-btn" onclick="sa(5000)">₹5K</button>
    </div>
  </div>

  <!-- TABS + HISTORY -->
  <div class="tabs-wrap">
    <div class="tabs-seg">
      <button class="tab active" id="tabH" onclick="switchTab('h')">Game History</button>
      <button class="tab" id="tabB" onclick="switchTab('b')">My Bets</button>
    </div>
  </div>
  <div class="hist-list" id="histPanel">
    <div class="hist-empty">Loading…</div>
  </div>
</div>

<!-- WIN/LOSS SHEET -->
<div class="sheet-ov" id="sheetOv">
  <div class="sheet" id="sheetEl">
    <div class="sheet-handle"></div>
    <div class="sheet-cd"><div class="sheet-cd-fill" id="cdFill" style="width:100%"></div></div>
    <div class="sheet-emoji" id="sEmoji">🎉</div>
    <div class="sheet-title" id="sTitle">You Won!</div>
    <div class="sheet-rows" id="sRows"></div>
    <button class="sheet-btn" id="sBtn" onclick="closeSheet()">Continue</button>
  </div>
</div>

<!-- DEPOSIT SHEET -->
<div class="dep-ov" id="depOv">
  <div class="dep-box">
    <div class="dep-icon">💳</div>
    <div class="dep-title">Deposit Required</div>
    <div class="dep-sub">Make your first deposit to start placing bets and winning real money!</div>
    <div class="dep-btns">
      <button class="dep-btn p" onclick="location.href='deposit.html'">Deposit Now</button>
      <button class="dep-btn s" onclick="document.getElementById('depOv').classList.remove('show');resetBtns()">Later</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<nav class="bot-nav">
  <a href="home.html"    class="nav-a"><div class="nav-ic-wrap">🏠</div><div class="nav-lb2">Home</div></a>
  <a href="game.html"    class="nav-a active"><div class="nav-ic-wrap">🎮</div><div class="nav-lb2">Game</div></a>
  <a href="wallet.html"  class="nav-a"><div class="nav-ic-wrap">💰</div><div class="nav-lb2">Wallet</div></a>
  <a href="profile.html" class="nav-a"><div class="nav-ic-wrap">👤</div><div class="nav-lb2">Profile</div></a>
</nav>

<script>
const API   = 'https://color-game-backend1.onrender.com';
const token = localStorage.getItem('token');
if (!token) location.href = 'index.html';

const ROUND_SEC = 60;
const CIRC = 2 * Math.PI * 43; // r=43 ≈ 270.2

let round = null, hasBet = false, curTab = 'h', sheetTmr = null;
let seenBets = new Set(JSON.parse(localStorage.getItem('sb2')||'[]'));

const sa   = v => document.getElementById('betAmt').value = v;
function half(){ const v=parseFloat(document.getElementById('betAmt').value)||0; document.getElementById('betAmt').value=Math.max(10,Math.floor(v/2)); }
function dbl() { const v=parseFloat(document.getElementById('betAmt').value)||0; document.getElementById('betAmt').value=Math.min(10000,(v||10)*2); }

function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2800);
}

function resetBtns() {
  ['redBtn','grnBtn'].forEach(id=>{
    document.getElementById(id).disabled=false;
    document.getElementById(id).classList.remove('selected','disabled');
  });
}

async function loadBalance() {
  try{
    const r=await fetch(`${API}/wallet`,{headers:{'Authorization':`Bearer ${token}`}});
    if(!r.ok)return; const d=await r.json();
    const b=((parseFloat(d.wallet||0)+parseFloat(d.bonus||0))).toFixed(2);
    document.getElementById('balChip').textContent='₹'+b;
  }catch(e){}
}

function updateRing(rem) {
  const pct    = rem / ROUND_SEC;
  const offset = CIRC * (1 - pct);
  const fill   = document.getElementById('ringFill');
  const num    = document.getElementById('ringNum');
  const tv     = document.getElementById('timeVal');
  const badge  = document.getElementById('phaseLbl');

  fill.style.strokeDashoffset = offset;
  num.textContent = rem;
  tv.textContent  = rem + 's';

  let color, cls, phaseText;
  if (rem > 15)     { color='#34c759'; cls='go';   phaseText='Betting Open'; }
  else if (rem > 5) { color='#ffd60a'; cls='warn';  phaseText='Hurry Up!'; }
  else              { color='#ff3b5c'; cls='stop'; phaseText='Closing...'; }

  fill.setAttribute('stroke', color);
  num.style.color = color;
  tv.className = 'time-val' + (cls==='warn'?' warn':cls==='stop'?' danger':'');

  if (rem<=0)      { badge.textContent='Calculating…'; badge.className='phase-label stop'; }
  else if (hasBet) { badge.textContent='Bet Placed ✓';  badge.className='phase-label go'; }
  else             { badge.textContent=phaseText; badge.className='phase-label '+cls; }

  const lock = rem<=3 || hasBet;
  ['redBtn','grnBtn'].forEach(id=>{
    document.getElementById(id).disabled=lock;
    document.getElementById(id).classList.toggle('disabled', lock);
  });
}

async function loadRound() {
  try{
    const r=await fetch(`${API}/round/current`); if(!r.ok)return;
    const d=await r.json();
    if(round && d.id!==round.id){ hasBet=false; resetBtns(); setTimeout(()=>{loadHist();if(curTab==='b')loadBets();checkResults();},2200); }
    round=d;
    document.getElementById('roundId').textContent='#' + (d.roundId||d.id||'—').toString().slice(-6);
  }catch(e){}
}

function tick() {
  if(!round)return;
  const elapsed=Math.floor((Date.now()-round.startTime)/1000);
  const rem=Math.max(0,ROUND_SEC-elapsed);
  updateRing(rem);
  if(rem===0) setTimeout(()=>{ hasBet=false; loadRound(); loadBalance(); },3200);
}

async function loadHist() {
  try{
    const r=await fetch(`${API}/rounds/history?t=${Date.now()}`,{cache:'no-cache'}); if(!r.ok)return;
    const data=await r.json();

    document.getElementById('streakPills').innerHTML=data.slice(0,12).map(rd=>{
      const c=rd.winner==='red'?'R':'G';
      return `<div class="s-pill ${c}">${c}</div>`;
    }).join('');

    if(curTab!=='h')return;
    if(!data.length){document.getElementById('histPanel').innerHTML='<div class="hist-empty">No rounds yet</div>';return;}
    document.getElementById('histPanel').innerHTML=data.map(rd=>{
      const cls=rd.winner==='red'?'R':'G';
      const dt=rd.endTime?new Date(rd.endTime).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
      return `<div class="hist-item">
        <div class="hist-badge2 ${cls}">${cls}</div>
        <div class="hist-info">
          <div class="hist-title2">Round ${(rd.roundId||rd._id||'').toString().slice(-6)||'—'}</div>
          <div class="hist-sub2">${dt}</div>
        </div>
        <div class="hist-result ${cls==='R'?'neutral-r':'neutral-g'}">${rd.winner.toUpperCase()}</div>
      </div>`;
    }).join('');
  }catch(e){}
}

async function loadBets() {
  try{
    const r=await fetch(`${API}/bets`,{headers:{'Authorization':`Bearer ${token}`}}); if(!r.ok)return;
    const data=await r.json();
    if(!data.length){document.getElementById('histPanel').innerHTML='<div class="hist-empty">No bets yet</div>';return;}
    document.getElementById('histPanel').innerHTML=data.map(b=>{
      const cls=b.color==='red'?'R':'G';
      const st=b.status||'PENDING';
      const vCls=st==='WON'?'won':st==='LOST'?'lost':'pend';
      const label=st==='WON'?`+₹${b.winAmount||0}`:st==='LOST'?`-₹${b.amount}`:st==='PENDING'?'Pending':'—';
      return `<div class="hist-item">
        <div class="hist-badge2 ${cls}">${cls}</div>
        <div class="hist-info">
          <div class="hist-title2">${b.color.charAt(0).toUpperCase()+b.color.slice(1)} — ₹${b.amount}</div>
          <div class="hist-sub2">Round ${(b.roundId||'').toString().slice(-6)||'—'}</div>
        </div>
        <div class="hist-result ${vCls}">${label}</div>
      </div>`;
    }).join('');
  }catch(e){}
}

function switchTab(t) {
  curTab=t;
  document.getElementById('tabH').classList.toggle('active',t==='h');
  document.getElementById('tabB').classList.toggle('active',t==='b');
  if(t==='h')loadHist(); else loadBets();
}

function pickColor(color, e) {
  document.getElementById('redBtn').classList.toggle('selected',color==='red');
  document.getElementById('grnBtn').classList.toggle('selected',color==='green');
  placeBet(color);
}

async function placeBet(color) {
  const amt=parseFloat(document.getElementById('betAmt').value);
  if(!amt||amt<10){ toast('⚠ Minimum bet is ₹10'); return; }
  if(amt>10000){ toast('⚠ Maximum bet is ₹10,000'); return; }
  if(hasBet){ toast('⚠ Already placed a bet this round'); return; }
  ['redBtn','grnBtn'].forEach(id=>{ document.getElementById(id).disabled=true; document.getElementById(id).classList.add('disabled'); });
  try{
    const res=await fetch(`${API}/bet`,{ method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({color,amount:amt}) });
    const d=await res.json();
    if(res.ok){ hasBet=true; loadBalance(); showSheet('bet',{color,amount:amt,roundId:d.roundId}); if(curTab==='b')loadBets(); }
    else{
      if(d.requireDeposit){ document.getElementById('depOv').classList.add('show'); }
      else{ toast('✕ '+(d.error||'Failed')); resetBtns(); }
    }
  }catch(e){ toast('✕ Network error'); resetBtns(); }
}

async function checkResults() {
  try{
    const r=await fetch(`${API}/bets`,{headers:{'Authorization':`Bearer ${token}`}}); if(!r.ok)return;
    const data=await r.json();
    data.forEach(b=>{
      if(!seenBets.has(b._id) && b.status && b.status!=='PENDING'){
        if(b.status==='WON'){ showSheet('win',{color:b.color,amount:b.amount,winAmount:b.winAmount,roundId:b.roundId}); launchConfetti(); }
        else if(b.status==='LOST'){ showSheet('loss',{color:b.color,amount:b.amount,roundId:b.roundId}); }
        seenBets.add(b._id);
      } else seenBets.add(b._id);
    });
    if(seenBets.size>150) seenBets=new Set(data.slice(0,70).map(b=>b._id));
    localStorage.setItem('sb2',JSON.stringify([...seenBets]));
  }catch(e){}
}

function showSheet(type, data) {
  const ov=document.getElementById('sheetOv');
  const el=document.getElementById('sheetEl');
  el.className='sheet '+type;
  const emojis={bet:'⚡',win:'🎉',loss:'😢'};
  const titles={bet:'Bet Placed!',win:'You Won! 🏆',loss:'Better Luck!'};
  document.getElementById('sEmoji').textContent=emojis[type];
  document.getElementById('sTitle').textContent=titles[type];
  document.getElementById('sBtn').textContent=type==='win'?'Amazing! Collect':'Try Again';

  const colColor=data.color==='red'?'var(--red)':'var(--green)';
  let rows=`<div class="s-row"><span class="s-row-k">Round</span><span class="s-row-v">#${(data.roundId||'—').toString().slice(-6)}</span></div>
    <div class="s-row"><span class="s-row-k">Color</span><span class="s-row-v" style="color:${colColor}">${(data.color||'').charAt(0).toUpperCase()+(data.color||'').slice(1)}</span></div>
    <div class="s-row"><span class="s-row-k">Amount</span><span class="s-row-v">₹${data.amount}</span></div>`;
  if(type==='win') rows+=`<div class="s-row"><span class="s-row-k">Payout</span><span class="s-row-v" style="color:var(--green)">₹${data.winAmount||0}</span></div>`;
  document.getElementById('sRows').innerHTML=rows;
  ov.classList.add('show');
  startCd(type);
}

function startCd(type) {
  clearInterval(sheetTmr); let t=5;
  const fill=document.getElementById('cdFill');
  const fn=()=>{ fill.style.width=(t/5*100)+'%'; if(t<=0){clearInterval(sheetTmr);closeSheet();} t--; };
  fn(); sheetTmr=setInterval(fn,1000);
}

function closeSheet() { clearInterval(sheetTmr); document.getElementById('sheetOv').classList.remove('show'); loadBalance(); }

function launchConfetti() {
  const cols=['#34c759','#ff3b5c','#007aff','#ffd60a','#af52de','#ffffff'];
  for(let i=0;i<55;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='conf';
      el.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${Math.random()*2+2.5}s;animation-delay:${Math.random()*.5}s;width:${Math.random()*9+4}px;height:${Math.random()*9+4}px;transform:rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el); setTimeout(()=>el.remove(),4500);
    },i*28);
  }
}

loadBalance(); loadRound(); loadHist();
setInterval(tick,1000);
setInterval(loadRound,3500);
setInterval(checkResults,3500);
setInterval(()=>{ if(curTab==='h')loadHist(); else loadBets(); },6000);
</script>
</body>
</html>
