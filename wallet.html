<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>My Wallet — BIGWIN</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #0b0c17;
  --card:       rgba(255,255,255,0.07);
  --card2:      rgba(255,255,255,0.04);
  --glass:      rgba(255,255,255,0.09);
  --border:     rgba(255,255,255,0.10);
  --border2:    rgba(255,255,255,0.06);
  --green:      #34c759;
  --green-bg:   rgba(52,199,89,0.12);
  --red:        #ff3b5c;
  --red-bg:     rgba(255,59,92,0.12);
  --blue:       #007aff;
  --blue-bg:    rgba(0,122,255,0.12);
  --gold:       #ffd60a;
  --gold-bg:    rgba(255,214,10,0.10);
  --purple:     #af52de;
  --purple-bg:  rgba(175,82,222,0.12);
  --txt:        #f2f2f7;
  --txt2:       rgba(242,242,247,0.55);
  --txt3:       rgba(242,242,247,0.30);
  --safe-top:   env(safe-area-inset-top, 44px);
  --safe-bot:   env(safe-area-inset-bottom, 34px);
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: 'Nunito Sans', sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: calc(90px + var(--safe-bot));
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 35% at 15% 5%, rgba(52,199,89,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 80%, rgba(0,122,255,.05) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 40%, rgba(255,214,10,.03) 0%, transparent 70%);
}

.wrap {
  max-width: 430px; margin: 0 auto;
  padding: 0 16px;
  position: relative; z-index: 1;
}

.safe-top { height: calc(var(--safe-top) + 8px); }

/* ── TOP HEADER ── */
.top-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0 16px;
}
.page-title {
  font-family: 'Nunito', sans-serif;
  font-size: 24px; font-weight: 900; letter-spacing: -.3px;
}
.refresh-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border);
  display: grid; place-items: center; font-size: 16px;
  cursor: pointer; transition: all .2s;
  backdrop-filter: blur(10px);
}
.refresh-btn:active { transform: scale(.88) rotate(90deg); }

/* ── BALANCE CARD ── */
.bal-card {
  background: linear-gradient(145deg, #111824 0%, #0d1620 60%, #0a1218 100%);
  border: 1px solid rgba(52,199,89,.2);
  border-radius: 28px; padding: 22px 20px 18px;
  margin-bottom: 14px;
  position: relative; overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,.35), 0 0 0 1px rgba(52,199,89,.08) inset;
}
.bal-card::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(52,199,89,.07) 0%, transparent 70%);
  pointer-events: none;
}
.bal-card::after {
  content: '';
  position: absolute; bottom: -30px; left: -20px;
  width: 140px; height: 140px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,122,255,.05) 0%, transparent 70%);
  pointer-events: none;
}

.bal-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 4px;
}
.bal-lbl {
  font-size: 11px; font-weight: 800; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--txt3);
}
.live-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--green-bg); border: 1px solid rgba(52,199,89,.25);
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; font-weight: 800; color: var(--green);
  letter-spacing: .5px;
}
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 1.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.total-balance {
  font-family: 'Nunito', sans-serif;
  font-size: 44px; font-weight: 900; letter-spacing: -1px;
  color: #fff; margin: 6px 0 18px; line-height: 1;
}
.total-balance .sym { font-size: 28px; vertical-align: top; margin-top: 7px; display: inline-block; color: rgba(255,255,255,.7); }

.bal-split {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 16px;
}
.bal-box {
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border2);
  border-radius: 16px; padding: 12px 14px;
}
.bal-box-lbl {
  font-size: 10px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 5px;
}
.bal-box-val {
  font-family: 'Nunito', sans-serif;
  font-size: 20px; font-weight: 900; color: var(--green);
}
.bal-box-hint {
  font-size: 10px; color: var(--txt3); margin-top: 3px;
  font-weight: 600;
}
.bal-box.bonus .bal-box-val { color: var(--gold); }

.wallet-pct-row {
  display: flex; align-items: center; gap: 10px;
}
.pct-lbl {
  font-size: 10px; font-weight: 700; color: var(--txt3);
  letter-spacing: .5px; text-transform: uppercase; flex-shrink: 0;
}
.pct-bar-wrap {
  flex: 1; height: 5px; background: rgba(255,255,255,.08);
  border-radius: 3px; overflow: hidden;
}
.pct-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--green), #28a745);
  border-radius: 3px; transition: width .6s ease;
}
.pct-val { font-size: 11px; font-weight: 800; color: var(--green); flex-shrink: 0; }

/* ── ACTION BUTTONS ── */
.action-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 14px;
}
.act-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 17px 16px; border-radius: 20px; border: none;
  font-family: 'Nunito', sans-serif;
  font-size: 17px; font-weight: 900;
  cursor: pointer; text-decoration: none;
  transition: transform .15s, box-shadow .2s;
}
.act-btn:active { transform: scale(.94); }
.act-btn.deposit {
  background: linear-gradient(135deg, #34c759, #1a9e3f);
  color: #fff;
  box-shadow: 0 8px 28px rgba(52,199,89,.35);
}
.act-btn.withdraw {
  background: linear-gradient(135deg, #ff3b5c, #c8102e);
  color: #fff;
  box-shadow: 0 8px 28px rgba(255,59,92,.3);
}
.act-btn-icon { font-size: 20px; }

/* ── QUICK LINKS ── */
.quick-grid {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 8px;
  margin-bottom: 14px;
}
.ql-btn {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 18px; padding: 14px 8px;
  cursor: pointer; text-decoration: none;
  transition: all .2s;
  backdrop-filter: blur(10px);
}
.ql-btn:active { transform: scale(.92); background: var(--glass); }
.ql-icon {
  width: 40px; height: 40px; border-radius: 13px;
  display: grid; place-items: center; font-size: 18px;
}
.ql-lbl {
  font-size: 10px; font-weight: 800; color: var(--txt3);
  letter-spacing: .3px; text-align: center; line-height: 1.2;
}
.ql-btn.g .ql-icon  { background: var(--green-bg); }
.ql-btn.r .ql-icon  { background: var(--red-bg); }
.ql-btn.b .ql-icon  { background: var(--blue-bg); }
.ql-btn.p .ql-icon  { background: var(--purple-bg); }

/* ── STATS STRIP ── */
.stats-row {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px;
  margin-bottom: 14px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 18px; padding: 14px 12px;
  text-align: center;
  backdrop-filter: blur(10px);
}
.stat-icon { font-size: 20px; margin-bottom: 6px; }
.stat-val {
  font-family: 'Nunito', sans-serif;
  font-size: 18px; font-weight: 900; color: var(--txt);
  margin-bottom: 3px;
}
.stat-lbl {
  font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; color: var(--txt3);
}

/* ── TABS ── */
.tabs-wrap { margin-bottom: 10px; }
.tabs-seg {
  display: flex; background: rgba(255,255,255,.06);
  border-radius: 14px; padding: 4px; gap: 2px;
}
.seg-tab {
  flex: 1; padding: 9px; border: none; border-radius: 11px;
  background: none; color: var(--txt3);
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800;
  cursor: pointer; transition: all .2s; letter-spacing: .2px;
}
.seg-tab.active {
  background: var(--glass); color: var(--txt);
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
}

/* ── TRANSACTION LIST ── */
.tx-list {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 22px; overflow: hidden;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.tx-empty {
  padding: 50px 20px; text-align: center; color: var(--txt3);
  font-size: 14px; font-weight: 700;
}
.tx-empty-icon { font-size: 40px; opacity: .3; margin-bottom: 10px; }

.tx-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border2);
  transition: background .15s;
}
.tx-item:last-child { border-bottom: none; }
.tx-item:active { background: rgba(255,255,255,.03); }

.tx-icon-wrap {
  width: 42px; height: 42px; border-radius: 14px;
  display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
}
.tx-icon-wrap.dep { background: var(--green-bg); }
.tx-icon-wrap.wit { background: var(--red-bg); }

.tx-info { flex: 1; min-width: 0; }
.tx-type {
  font-size: 14px; font-weight: 800; color: var(--txt);
  margin-bottom: 3px;
}
.tx-date { font-size: 11px; color: var(--txt3); font-weight: 600; }

.tx-right { text-align: right; flex-shrink: 0; }
.tx-amt {
  font-family: 'Nunito', sans-serif;
  font-size: 16px; font-weight: 900; margin-bottom: 4px;
}
.tx-amt.pos { color: var(--green); }
.tx-amt.neg { color: var(--red); }
.tx-status {
  display: inline-flex; padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .4px;
}
.s-success, .s-approved { background: var(--green-bg); color: var(--green); }
.s-pending  { background: var(--gold-bg); color: var(--gold); }
.s-failed, .s-rejected   { background: var(--red-bg); color: var(--red); }

/* ── BOTTOM NAV ── */
.bot-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(11,12,23,.9);
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border-top: 1px solid var(--border2);
  padding: 8px 0 calc(8px + var(--safe-bot));
  display: flex; z-index: 100;
}
.nav-a {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  text-decoration: none; color: var(--txt3);
  transition: all .2s; padding: 4px 0;
}
.nav-a.active { color: var(--blue); }
.nav-ic { font-size: 22px; transition: transform .2s; }
.nav-a.active .nav-ic { transform: scale(1.15); }
.nav-lb {
  font-size: 10px; font-weight: 800;
  letter-spacing: .5px; text-transform: uppercase;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="safe-top"></div>

  <!-- HEADER -->
  <div class="top-hdr">
    <div class="page-title">💰 My Wallet</div>
    <button class="refresh-btn" onclick="refresh()">⟳</button>
  </div>

  <!-- BALANCE CARD -->
  <div class="bal-card">
    <div class="bal-top">
      <div class="bal-lbl">Total Balance</div>
      <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    </div>
    <div class="total-balance"><span class="sym">₹</span><span id="totalBalance">0.00</span></div>
    <div class="bal-split">
      <div class="bal-box">
        <div class="bal-box-lbl">Wallet</div>
        <div class="bal-box-val" id="walletBalance">₹0.00</div>
        <div class="bal-box-hint">✓ Withdrawable</div>
      </div>
      <div class="bal-box bonus">
        <div class="bal-box-lbl">Bonus</div>
        <div class="bal-box-val" id="bonusBalance">₹0.00</div>
        <div class="bal-box-hint">⚡ Games only</div>
      </div>
    </div>
    <div class="wallet-pct-row">
      <div class="pct-lbl">Wallet %</div>
      <div class="pct-bar-wrap">
        <div class="pct-bar-fill" id="pctBar" style="width:0%"></div>
      </div>
      <div class="pct-val" id="pctVal">0%</div>
    </div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="action-row">
    <a href="deposit.html" class="act-btn deposit">
      <span class="act-btn-icon">💳</span> Deposit
    </a>
    <a href="withdraw.html" class="act-btn withdraw">
      <span class="act-btn-icon">💸</span> Withdraw
    </a>
  </div>

  <!-- QUICK LINKS -->
  <div class="quick-grid">
    <a href="deposit.html" class="ql-btn g">
      <div class="ql-icon">📥</div>
      <div class="ql-lbl">Deposits</div>
    </a>
    <a href="withdraw.html" class="ql-btn r">
      <div class="ql-icon">📤</div>
      <div class="ql-lbl">Withdrawals</div>
    </a>
    <a href="profile.html" class="ql-btn b">
      <div class="ql-icon">⚙️</div>
      <div class="ql-lbl">Pay Method</div>
    </a>
    <a href="profile.html" class="ql-btn p">
      <div class="ql-icon">🎁</div>
      <div class="ql-lbl">Referral</div>
    </a>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-icon">🎯</div>
      <div class="stat-val" id="statWagered">₹0</div>
      <div class="stat-lbl">Wagered</div>
    </div>
    <div class="stat-box">
      <div class="stat-icon">💵</div>
      <div class="stat-val" id="statDeposited">₹0</div>
      <div class="stat-lbl">Deposited</div>
    </div>
    <div class="stat-box">
      <div class="stat-icon">👥</div>
      <div class="stat-val" id="statReferrals">0</div>
      <div class="stat-lbl">Referrals</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs-wrap">
    <div class="tabs-seg">
      <button class="seg-tab active" id="tabAll" onclick="switchTab('all',this)">All</button>
      <button class="seg-tab" id="tabDep" onclick="switchTab('deposit',this)">Deposits</button>
      <button class="seg-tab" id="tabWit" onclick="switchTab('withdraw',this)">Withdrawals</button>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div class="tx-list" id="txList">
    <div class="tx-empty">
      <div class="tx-empty-icon">📊</div>
      Loading transactions…
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bot-nav">
  <a href="home.html"    class="nav-a"><div class="nav-ic">🏠</div><div class="nav-lb">Home</div></a>
  <a href="game.html"    class="nav-a"><div class="nav-ic">🎮</div><div class="nav-lb">Game</div></a>
  <a href="wallet.html"  class="nav-a active"><div class="nav-ic">💰</div><div class="nav-lb">Wallet</div></a>
  <a href="profile.html" class="nav-a"><div class="nav-ic">👤</div><div class="nav-lb">Profile</div></a>
</nav>

<script>
const API   = 'https://color-game-backend1.onrender.com';
const token = localStorage.getItem('token');
if (!token) location.href = 'index.html';

let currentTab = 'all';
let allDeposits = [], allWithdrawals = [];

const fmt = n => '₹' + Math.abs(Number(n)||0).toLocaleString('en-IN');

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
}

async function loadWalletData() {
  try {
    const res = await fetch(`${API}/wallet`, { headers:{'Authorization':`Bearer ${token}`} });
    if (!res.ok) return;
    const data = await res.json();

    const wallet = Number(data.wallet) || 0;
    const bonus  = Number(data.bonus)  || 0;
    const total  = wallet + bonus;

    document.getElementById('totalBalance').textContent   = total.toFixed(2);
    document.getElementById('walletBalance').textContent  = fmt(wallet);
    document.getElementById('bonusBalance').textContent   = fmt(bonus);

    const pct = total > 0 ? Math.round((wallet/total)*100) : 0;
    document.getElementById('pctBar').style.width = pct + '%';
    document.getElementById('pctVal').textContent = pct + '%';

    // Stats from profile
    if (data.totalWagered !== undefined) document.getElementById('statWagered').textContent   = fmt(data.totalWagered);
    if (data.depositAmount !== undefined) document.getElementById('statDeposited').textContent = fmt(data.depositAmount);
    if (data.referralCount !== undefined) document.getElementById('statReferrals').textContent = data.referralCount;
  } catch(e) { console.error(e); }
}

async function loadTransactions() {
  try {
    const [dr, wr] = await Promise.all([
      fetch(`${API}/wallet/deposit-history`,  { headers:{'Authorization':`Bearer ${token}`} }),
      fetch(`${API}/wallet/withdraw-history`, { headers:{'Authorization':`Bearer ${token}`} })
    ]);
    allDeposits    = (await dr.json()).map(d => ({...d, type:'deposit'}));
    allWithdrawals = (await wr.json()).map(w => ({...w, type:'withdraw'}));
    renderTransactions();
  } catch(e) { console.error(e); }
}

function renderTransactions() {
  const all = [...allDeposits, ...allWithdrawals]
    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

  const filtered = all.filter(t => {
    if (currentTab === 'all')     return true;
    if (currentTab === 'deposit') return t.type === 'deposit';
    return t.type === 'withdraw';
  });

  const el = document.getElementById('txList');
  if (!filtered.length) {
    el.innerHTML = `<div class="tx-empty"><div class="tx-empty-icon">📊</div>No transactions yet</div>`;
    return;
  }

  el.innerHTML = filtered.map(t => {
    const isDep = t.type === 'deposit';
    const amt   = isDep ? `+${fmt(t.amount)}` : `-${fmt(t.amount)}`;
    const st    = (t.status||'pending').toLowerCase();
    const stCls = st === 'success' || st === 'approved' ? 's-success s-approved'
                : st === 'pending'  ? 's-pending'
                : 's-failed s-rejected';
    const stLbl = t.status || 'PENDING';

    return `<div class="tx-item">
      <div class="tx-icon-wrap ${isDep?'dep':'wit'}">${isDep?'⬇️':'⬆️'}</div>
      <div class="tx-info">
        <div class="tx-type">${isDep ? 'Deposit' : 'Withdrawal'}</div>
        <div class="tx-date">${fmtDate(t.createdAt)}</div>
      </div>
      <div class="tx-right">
        <div class="tx-amt ${isDep?'pos':'neg'}">${amt}</div>
        <span class="tx-status ${stCls}">${stLbl}</span>
      </div>
    </div>`;
  }).join('');
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.seg-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTransactions();
}

function refresh() {
  loadWalletData();
  loadTransactions();
}

loadWalletData();
loadTransactions();
setInterval(loadWalletData, 12000);
</script>
</body>
</html>
