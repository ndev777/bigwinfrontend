<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tournaments — BIGWIN</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0c17;
  --card:     rgba(255,255,255,0.07);
  --card2:    rgba(255,255,255,0.04);
  --glass:    rgba(255,255,255,0.09);
  --border:   rgba(255,255,255,0.10);
  --border2:  rgba(255,255,255,0.06);
  --txt:      #f2f2f7;
  --txt2:     rgba(242,242,247,0.55);
  --txt3:     rgba(242,242,247,0.30);
  --green:    #34c759;
  --green-bg: rgba(52,199,89,0.12);
  --green-bd: rgba(52,199,89,0.30);
  --blue:     #007aff;
  --blue-bg:  rgba(0,122,255,0.12);
  --gold:     #ffd60a;
  --gold-bg:  rgba(255,214,10,0.11);
  --gold-bd:  rgba(255,214,10,0.30);
  --red:      #ff3b5c;
  --red-bg:   rgba(255,59,92,0.12);
  --red-bd:   rgba(255,59,92,0.30);
  --purple:   #af52de;
  --purple-bg:rgba(175,82,222,0.12);
  --orange:   #ff9f0a;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--txt); min-height:100dvh; overflow-x:hidden; padding-bottom:calc(90px + var(--safe-bot)); }

body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 35% at 50% 0%, rgba(255,214,10,.07) 0%, transparent 55%),
    radial-gradient(ellipse 55% 40% at 10% 70%, rgba(0,122,255,.05) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 90% 80%, rgba(52,199,89,.05) 0%, transparent 55%);
}

.wrap { max-width:430px; margin:0 auto; padding:0 16px; position:relative; z-index:1; }
.safe-top { height:calc(var(--safe-top) + 8px); }

/* ── TOP NAV ── */
.top-nav { display:flex; align-items:center; justify-content:space-between; padding:6px 0 18px; }
.back-btn {
  width:36px; height:36px; border-radius:50%;
  background:var(--card); border:1px solid var(--border);
  display:grid; place-items:center; font-size:18px;
  cursor:pointer; text-decoration:none; color:var(--txt); flex-shrink:0; transition:all .15s;
}
.back-btn:active { transform:scale(.88); }
.nav-title { font-family:'Nunito',sans-serif; font-size:22px; font-weight:900; letter-spacing:-.3px; }
.nav-right { display:flex; gap:8px; }
.refresh-btn {
  width:36px; height:36px; border-radius:50%;
  background:var(--card); border:1px solid var(--border);
  display:grid; place-items:center; font-size:16px;
  cursor:pointer; transition:all .2s;
}
.refresh-btn:active { transform:rotate(180deg) scale(.88); }

/* ── MY TOURNAMENTS CARD ── */
.my-card {
  display:flex; align-items:center; gap:14px;
  background:linear-gradient(135deg, rgba(0,122,255,.1), rgba(0,122,255,.05));
  border:1px solid rgba(0,122,255,.25);
  border-radius:22px; padding:15px 16px;
  margin-bottom:14px; cursor:pointer; text-decoration:none;
  transition:all .2s; backdrop-filter:blur(12px);
}
.my-card:active { transform:scale(.97); }
.my-card-ic {
  width:46px; height:46px; border-radius:15px;
  background:var(--blue-bg); border:1px solid rgba(0,122,255,.25);
  display:grid; place-items:center; font-size:22px; flex-shrink:0;
  position:relative;
}
.my-card-badge {
  position:absolute; top:-4px; right:-4px;
  width:18px; height:18px; border-radius:50%;
  background:var(--red); border:2px solid var(--bg);
  display:grid; place-items:center;
  font-size:9px; font-weight:900; color:#fff;
}
.my-card-body { flex:1; }
.my-card-title { font-family:'Nunito',sans-serif; font-size:15px; font-weight:900; margin-bottom:3px; }
.my-card-sub { font-size:12px; color:var(--txt3); font-weight:700; }
.my-card-chev { color:var(--txt3); font-size:18px; }

/* ── LIVE PILL ── */
.live-alert {
  display:none; align-items:center; gap:8px;
  background:var(--red-bg); border:1px solid var(--red-bd);
  border-radius:16px; padding:10px 16px; margin-bottom:12px;
}
.live-alert.show { display:flex; }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--red); animation:pulse 1.4s infinite; flex-shrink:0; }
.live-txt { font-size:13px; font-weight:800; color:var(--red); flex:1; }
.live-view {
  padding:5px 14px; border-radius:10px; border:none;
  background:var(--red); color:#fff;
  font-family:'Nunito',sans-serif; font-size:11px; font-weight:900;
  cursor:pointer; flex-shrink:0; transition:all .15s;
}
.live-view:active { transform:scale(.9); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── FILTER PILLS ── */
.filters-wrap { margin-bottom:14px; }
.filters {
  display:flex; gap:8px; overflow-x:auto; padding-bottom:2px;
}
.filters::-webkit-scrollbar { display:none; }
.filter-pill {
  padding:9px 16px; border-radius:14px; border:none; white-space:nowrap;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
  cursor:pointer; transition:all .2s; flex-shrink:0;
  background:var(--card2); color:var(--txt3);
  border:1px solid var(--border2);
}
.filter-pill:active { transform:scale(.93); }
.filter-pill.active.all      { background:var(--gold-bg); border-color:var(--gold-bd); color:var(--gold); }
.filter-pill.active.open     { background:var(--green-bg); border-color:var(--green-bd); color:var(--green); }
.filter-pill.active.live     { background:var(--red-bg); border-color:var(--red-bd); color:var(--red); }
.filter-pill.active.upcoming { background:var(--blue-bg); border-color:rgba(0,122,255,.3); color:var(--blue); }
.filter-pill.active.completed{ background:var(--card); border-color:var(--border); color:var(--txt2); }

/* ── COUNT ROW ── */
.count-row {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
}
.count-txt { font-size:13px; font-weight:800; color:var(--txt3); }

/* ── TOURNAMENT CARD ── */
.t-list { display:flex; flex-direction:column; gap:14px; }
.t-card {
  background:var(--card); border:1px solid var(--border2);
  border-radius:26px; overflow:hidden; cursor:pointer;
  transition:all .2s; backdrop-filter:blur(10px);
}
.t-card:active { transform:scale(.98); }

/* BANNER */
.t-banner {
  position:relative; aspect-ratio:16/8; overflow:hidden;
  background:linear-gradient(135deg,#1a1040,#0d1f3c);
}
.t-banner img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s; }
.t-card:active .t-banner img { transform:scale(1.03); }
.t-banner-gradient {
  position:absolute; inset:0;
  background:linear-gradient(0deg, rgba(0,0,0,.75) 0%, transparent 50%);
}
.t-banner-placeholder {
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  font-size:80px; opacity:.4;
}

/* OVERLAID BADGES */
.t-badge-row {
  position:absolute; top:12px; left:12px; right:12px;
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.game-tag {
  padding:5px 12px; border-radius:10px;
  background:rgba(0,0,0,.55); backdrop-filter:blur(8px);
  font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.8px;
  border:1px solid rgba(255,255,255,.15); color:#fff;
}
.status-pill {
  padding:5px 12px; border-radius:10px;
  font-size:10px; font-weight:900; letter-spacing:.5px;
  backdrop-filter:blur(8px); white-space:nowrap;
}
.status-pill.open      { background:rgba(52,199,89,.25); border:1px solid var(--green-bd); color:var(--green); }
.status-pill.live      { background:rgba(255,59,92,.3); border:1px solid var(--red-bd); color:#fff; animation:throbPill 1s infinite alternate; }
@keyframes throbPill { from{box-shadow:0 0 0 rgba(255,59,92,0)} to{box-shadow:0 0 12px rgba(255,59,92,.5)} }
.status-pill.upcoming  { background:rgba(0,122,255,.2); border:1px solid rgba(0,122,255,.3); color:var(--blue); }
.status-pill.completed { background:rgba(255,255,255,.12); border:1px solid var(--border); color:var(--txt2); }
.status-pill.cancelled { background:rgba(255,255,255,.1); border:1px solid var(--border); color:var(--txt3); }

/* SLOTS BAR on image bottom */
.slots-overlay {
  position:absolute; bottom:0; left:0; right:0; padding:10px 14px;
  background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 100%);
}
.slots-row { display:flex; justify-content:space-between; margin-bottom:5px; }
.slots-lbl { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; color:rgba(255,255,255,.6); }
.slots-cnt { font-size:10px; font-weight:900; color:#fff; }
.slots-track { height:4px; background:rgba(255,255,255,.15); border-radius:2px; overflow:hidden; }
.slots-fill  { height:100%; background:linear-gradient(90deg,var(--green),#28a745); border-radius:2px; transition:width .6s; }
.slots-fill.warn { background:linear-gradient(90deg,var(--orange),#e8a800); }
.slots-fill.full { background:linear-gradient(90deg,var(--red),#c8102e); }

/* CARD BODY */
.t-body { padding:16px; }
.t-title { font-family:'Nunito',sans-serif; font-size:18px; font-weight:900; letter-spacing:-.3px; margin-bottom:12px; }
.t-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.t-stat { text-align:center; background:rgba(255,255,255,.05); border:1px solid var(--border2); border-radius:14px; padding:10px 6px; }
.t-stat-lbl { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; color:var(--txt3); margin-bottom:4px; }
.t-stat-val { font-family:'Nunito',sans-serif; font-size:16px; font-weight:900; color:var(--txt); }
.t-stat-val.green { color:var(--green); }
.t-stat-val.gold  { color:var(--gold); }
.t-footer { display:flex; align-items:center; justify-content:space-between; }
.t-time { font-size:12px; color:var(--txt3); font-weight:700; display:flex; align-items:center; gap:5px; }
.join-btn {
  padding:11px 22px; border:none; border-radius:16px; cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:900;
  transition:all .15s;
}
.join-btn:active { transform:scale(.92); }
.join-btn.open-btn  { background:linear-gradient(135deg,var(--gold),#e8a800); color:#000; box-shadow:0 6px 18px rgba(255,214,10,.35); }
.join-btn.live-btn  { background:linear-gradient(135deg,var(--red),#c8102e); color:#fff; box-shadow:0 6px 18px rgba(255,59,92,.3); }
.join-btn.view-btn  { background:var(--blue-bg); border:1px solid rgba(0,122,255,.25); color:var(--blue); }
.join-btn.done-btn  { background:rgba(255,255,255,.07); border:1px solid var(--border); color:var(--txt3); cursor:default; }

/* ── SKELETONS ── */
.skel-list { display:flex; flex-direction:column; gap:14px; }
.skel-card { background:var(--card); border:1px solid var(--border2); border-radius:26px; overflow:hidden; }
.skel-banner { aspect-ratio:16/8; background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
.skel-body { padding:16px; }
.skel-line { height:14px; border-radius:7px; background:rgba(255,255,255,.06); margin-bottom:10px; }
.skel-line.w80 { width:80%; }
.skel-line.w60 { width:60%; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── EMPTY ── */
.empty-state {
  background:var(--card); border:1px solid var(--border2);
  border-radius:22px; padding:60px 20px; text-align:center;
}
.e-icon { font-size:52px; opacity:.3; margin-bottom:14px; }
.e-title { font-family:'Nunito',sans-serif; font-size:17px; font-weight:900; margin-bottom:6px; }
.e-sub { font-size:13px; color:var(--txt3); font-weight:700; }

/* ── BOTTOM NAV ── */
.bot-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(11,12,23,.9);
  backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
  border-top:1px solid var(--border2);
  padding:8px 0 calc(8px + var(--safe-bot));
  display:flex; z-index:100;
}
.nav-a { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; color:var(--txt3); transition:all .2s; padding:4px 0; }
.nav-a.active { color:var(--gold); }
.nav-ic { font-size:22px; transition:transform .2s; }
.nav-a.active .nav-ic { transform:scale(1.15); }
.nav-lb { font-size:10px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="safe-top"></div>

  <!-- TOP NAV -->
  <div class="top-nav">
    <a href="home.html" class="back-btn">‹</a>
    <div class="nav-title">🏆 Tournaments</div>
    <div class="nav-right">
      <div class="refresh-btn" onclick="loadTournaments()">⟳</div>
    </div>
  </div>

  <!-- MY TOURNAMENTS -->
  <a href="my-tournaments.html" class="my-card">
    <div class="my-card-ic">
      🎮
      <div class="my-card-badge" id="myBadge" style="display:none">!</div>
    </div>
    <div class="my-card-body">
      <div class="my-card-title">My Tournaments</div>
      <div class="my-card-sub">View joined &amp; upcoming events</div>
    </div>
    <div class="my-card-chev">›</div>
  </a>

  <!-- LIVE ALERT -->
  <div class="live-alert" id="liveAlert">
    <div class="live-dot"></div>
    <div class="live-txt" id="liveAlertTxt">Tournament live now!</div>
    <button class="live-view" onclick="setFilter('live',document.querySelector('[data-f=live]'))">View</button>
  </div>

  <!-- FILTERS -->
  <div class="filters-wrap">
    <div class="filters">
      <button class="filter-pill all active" data-f="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-pill open" data-f="open" onclick="setFilter('open',this)">✅ Open</button>
      <button class="filter-pill live" data-f="live" onclick="setFilter('live',this)">🔴 Live</button>
      <button class="filter-pill upcoming" data-f="upcoming" onclick="setFilter('upcoming',this)">🕐 Upcoming</button>
      <button class="filter-pill completed" data-f="completed" onclick="setFilter('completed',this)">✓ Completed</button>
    </div>
  </div>

  <!-- COUNT -->
  <div class="count-row">
    <div class="count-txt" id="countText">Loading…</div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div class="skel-list">
      <div class="skel-card"><div class="skel-banner"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div></div></div>
      <div class="skel-card"><div class="skel-banner"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div></div></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bot-nav">
  <a href="home.html"        class="nav-a"><div class="nav-ic">🏠</div><div class="nav-lb">Home</div></a>
  <a href="tournaments.html" class="nav-a active"><div class="nav-ic">🏆</div><div class="nav-lb">Tournaments</div></a>
  <a href="wallet.html"      class="nav-a"><div class="nav-ic">💰</div><div class="nav-lb">Wallet</div></a>
  <a href="profile.html"     class="nav-a"><div class="nav-ic">👤</div><div class="nav-lb">Profile</div></a>
</nav>

<script>
const API = 'https://color-game-backend1.onrender.com';
const token = localStorage.getItem('token');

let allTournaments = [];
let currentFilter  = 'all';

/* ── IMAGE MAP ── */
function getBannerImg(game, type) {
  const g = (game||'').toLowerCase();
  const t = (type||'').toLowerCase();
  if (g === 'freefire') {
    if (t === 'duo')   return 'images/ff-br-duo.png';
    if (t === 'squad') return 'images/ff-br-squad.png';
    return 'images/ff-br-solo.png';
  }
  return null;
}

/* ── STATUS CONFIG ── */
function statusCfg(status) {
  switch (status) {
    case 'registration_open': return { cls:'open',      pill:'✓ Open',      btnCls:'open-btn', btnTxt:'Join Now' };
    case 'ongoing':           return { cls:'live',      pill:'🔴 Live',     btnCls:'live-btn', btnTxt:'View Live' };
    case 'upcoming':          return { cls:'upcoming',  pill:'🕐 Upcoming', btnCls:'view-btn', btnTxt:'View' };
    case 'completed':         return { cls:'completed', pill:'✓ Done',      btnCls:'view-btn', btnTxt:'Results' };
    case 'cancelled':         return { cls:'cancelled', pill:'Cancelled',   btnCls:'done-btn', btnTxt:'—' };
    default:                  return { cls:'upcoming',  pill:status,        btnCls:'view-btn', btnTxt:'View' };
  }
}

/* ── RENDER CARD ── */
function renderCard(t) {
  const img  = getBannerImg(t.game, t.type);
  const cfg  = statusCfg(t.status);
  const used  = t.currentParticipants || 0;
  const total = t.totalSlots || 1;
  const pct   = Math.min(100, Math.round(used / total * 100));
  const slotCls = pct >= 100 ? 'full' : pct >= 75 ? 'warn' : '';
  const d     = new Date(t.startTime);
  const ts    = isNaN(d) ? '—' : d.toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});

  const bannerInner = img
    ? `<img src="${img}" alt="${t.game} ${t.type}" loading="lazy">`
    : `<div class="t-banner-placeholder">🏆</div>`;

  return `<div class="t-card" onclick="location.href='tournament-details.html?id=${t._id}'">
    <div class="t-banner">
      ${bannerInner}
      <div class="t-banner-gradient"></div>
      <div class="t-badge-row">
        <div class="game-tag">${(t.game||'GAME').toUpperCase()}</div>
        <div class="status-pill ${cfg.cls}">${cfg.pill}</div>
      </div>
      <div class="slots-overlay">
        <div class="slots-row">
          <div class="slots-lbl">Slots</div>
          <div class="slots-cnt">${used} / ${total}</div>
        </div>
        <div class="slots-track"><div class="slots-fill ${slotCls}" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="t-body">
      <div class="t-title">${t.title||'Tournament'}</div>
      <div class="t-stats">
        <div class="t-stat">
          <div class="t-stat-lbl">Mode</div>
          <div class="t-stat-val">${(t.type||'Solo').toUpperCase()}</div>
        </div>
        <div class="t-stat">
          <div class="t-stat-lbl">Entry</div>
          <div class="t-stat-val green">₹${t.entryFee||0}</div>
        </div>
        <div class="t-stat">
          <div class="t-stat-lbl">Prize Pool</div>
          <div class="t-stat-val gold">₹${t.prizePool||0}</div>
        </div>
      </div>
      <div class="t-footer">
        <div class="t-time">🕐 ${ts}</div>
        <button class="join-btn ${cfg.btnCls}" onclick="event.stopPropagation();location.href='tournament-details.html?id=${t._id}'">${cfg.btnTxt}</button>
      </div>
    </div>
  </div>`;
}

/* ── RENDER LIST ── */
function renderList(list) {
  const el        = document.getElementById('content');
  const liveCount = list.filter(t => t.status === 'ongoing').length;
  const alert     = document.getElementById('liveAlert');

  if (liveCount > 0) {
    alert.classList.add('show');
    document.getElementById('liveAlertTxt').textContent = `${liveCount} tournament${liveCount>1?'s':''} live right now!`;
  } else {
    alert.classList.remove('show');
  }

  document.getElementById('countText').textContent = `${list.length} tournament${list.length!==1?'s':''}`;

  if (!list.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="e-icon">🏆</div>
      <div class="e-title">No Tournaments Found</div>
      <div class="e-sub">Check back soon for new events</div>
    </div>`;
    return;
  }

  el.innerHTML = `<div class="t-list">${list.map(renderCard).join('')}</div>`;
}

/* ── FILTER ── */
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  let list = allTournaments;
  if (currentFilter !== 'all') {
    list = allTournaments.filter(t => {
      if (currentFilter === 'open')      return t.status === 'registration_open';
      if (currentFilter === 'live')      return t.status === 'ongoing';
      if (currentFilter === 'upcoming')  return t.status === 'upcoming';
      if (currentFilter === 'completed') return t.status === 'completed';
      return true;
    });
  }
  renderList(list);
}

/* ── LOAD ── */
async function loadTournaments() {
  try {
    const headers = token ? {'Authorization':`Bearer ${token}`} : {};
    const res  = await fetch(`${API}/tournaments`, { headers });
    const data = await res.json();
    allTournaments = Array.isArray(data) ? data : (data.tournaments || []);
    applyFilter();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty-state">
      <div class="e-icon">⚠️</div>
      <div class="e-title">Connection Error</div>
      <div class="e-sub">Check your network and try again</div>
    </div>`;
    document.getElementById('countText').textContent = 'Error';
  }
}

loadTournaments();
setInterval(loadTournaments, 30000);
</script>
</body>
</html>
